<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations | Michiru Sushi</title>
    <meta name="description" content="Find a Michiru Sushi location near you in Houston or Webster. Check hours and lunch menus.">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="/" class="logo">MICHURU</a>
            <div class="nav-links">
                <a href="/menu">Menu</a>
                <a href="/locations" style="color: var(--accent-color);">Locations</a>
                <a href="/gallery">Gallery</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h2>Visit Us</h2>
        </div>
    </header>

    <main class="container">
        <div class="menu-grid">
            <div class="menu-card">
                <h3 style="color: var(--accent-color);">Houston</h3>
                <p>123 Sushi Lane, Houston, TX 77002</p>
                <div style="margin-top: 1rem;">
                    <a href="/locations/houston" style="border-bottom: 2px solid var(--accent-color);">View Location</a>
                </div>
            </div>
            <div class="menu-card">
                <h3 style="color: var(--accent-color);">Webster</h3>
                <p>456 Salmon Way, Webster, TX 77598</p>
                <div style="margin-top: 1rem;">
                    <a href="/locations/webster" style="border-bottom: 2px solid var(--accent-color);">View Location</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Michiru Sushi. All rights reserved.</p>
        </div>
    </footer>

</html>
