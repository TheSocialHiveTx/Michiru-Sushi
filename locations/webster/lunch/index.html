<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webster Lunch Menu | Michiru Sushi</title>
    <meta name="description" content="View our exclusive lunch specials at the Michiru Sushi Webster location. Available daily.">
    <link rel="stylesheet" href="../../../styles.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="/" class="logo">MICHURU</a>
            <div class="nav-links">
                <a href="/menu">Menu</a>
                <a href="/locations" style="color: var(--accent-color);">Locations</a>
                <a href="/gallery">Gallery</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="section-title">
            <p style="text-transform: uppercase;">Webster Specials</p>
            <h2>Lunch Menu</h2>
        </header>

        <div class="menu-grid">
            <div class="menu-card">
                <div style="display: flex; justify-content: space-between;">
                    <h3 style="color: var(--accent-color);">Webster Lunch A</h3>
                    <span style="color: var(--accent-color);">$17</span>
                </div>
                <p>Nigiri sampler, spicy tuna roll & miso soup.</p>
            </div>
            <div class="menu-card">
                 <div style="display: flex; justify-content: space-between;">
                    <h3 style="color: var(--accent-color);">Webster Lunch B</h3>
                    <span style="color: var(--accent-color);">$20</span>
                </div>
                <p>Sashimi selection, California roll & salad.</p>
            </div>
        </div>
        <div style="text-align: center; margin-top: 3rem;">
            <a href="/locations/webster" style="border-bottom: 2px solid var(--accent-color);">Back to Webster Location</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Michiru Sushi. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
