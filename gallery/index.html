<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashimi Gallery | Michiru Sushi</title>
    <meta name="description" content="Explore our visual feast of meticulously crafted sushi, sashimi, and culinary masterpieces.">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="/" class="logo">MICHURU</a>
            <div class="nav-links">
                <a href="/menu">Menu</a>
                <a href="/locations">Locations</a>
                <a href="/gallery" style="color: var(--accent-color);">Gallery</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="section-title">
            <h2>The Art of Sushi</h2>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 3rem;">
            <!-- Placeholder Images for the Gallery -->
            <div class="menu-card" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #222; border: 1px dashed var(--accent-color);">
                <p>Signature Roll #1</p>
            </div>
            <div class="menu-card" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #222; border: 1px dashed var(--accent-color);">
                <p>Nigiri Selection</p>
            </div>
            <div class="menu-card" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #222; border: 1px dashed var(--accent-color);">
                <p>Fresh Sashimi Platter</p>
            </div>
            <div class="menu-card" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #222; border: 1px dashed var(--accent-color);">
                <p>Cocktail Selection</p>
            </div>
            <div class="menu-card" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #222; border: 1px dashed var(--accent-color);">
                <p>Main Course #1</p>
            </div>
            <div class="menu-card" style="aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #222; border: 1px dashed var(--accent-color);">
                <p>Dessert Creations</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Michiru Sushi. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
